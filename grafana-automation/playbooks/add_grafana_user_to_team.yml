---
- name: Add a Grafana user to an existing team
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    grafana_url: "{{ lookup('ansible.builtin.env', 'GRAFANA_URL') }}"
    grafana_username: "{{ lookup('ansible.builtin.env', 'GRAFANA_USERNAME') }}"
    grafana_password: "{{ lookup('ansible.builtin.env', 'GRAFANA_PASSWORD') }}"
    grafana_api_token: "{{ lookup('ansible.builtin.env', 'GRAFANA_API_TOKEN') | default('', true) }}"
    influxdb_admin_token: "{{ lookup('ansible.builtin.env', 'INFLUXDB_ADMIN_TOKEN') }}"
    influxdb_org: "{{ lookup('ansible.builtin.env', 'INFLUXDB_ORG') }}"
    influxdb_host: "{{ lookup('ansible.builtin.env', 'INFLUXDB_HOST') }}"

    # Nom de la team Grafana existante (ex: company1), à passer via --extra-vars

    # Par défaut, on considère que la team correspond à la company.
    company_name: "{{ company_name_override | default(team_name, true) }}"

    # Template Jinja pour le dashboard de company
    dashboard_template: "{{ playbook_dir }}/../templates/dashboard.json.j2"
    campaign_dashboard_json: "/srv/powerview/dashboard_campaign.json"

    # UID déterministe pour l'idempotence du dashboard (un par user)
    campaign_dashboard_uid: "powerview_{{ company_name }}_{{ user_login }}"

    # user_login / user_email / user_password peuvent être surchargés via --extra-vars
    user_login: "{{ user_login_override | default('user_' ~ team_name, true) }}"
    user_email: "{{ user_email_override | default(team_name ~ '@example.com', true) }}"
    user_password: "{{ user_password_override | default('ChangeMe123!', true) }}"

    grafana_auth_headers: >-
      {{
        {'Authorization': 'Bearer ' ~ grafana_api_token}
      }}

  tasks:
    - name: Validate required variable team_name
      ansible.builtin.assert:
        that:
          - team_name is defined
          - team_name | length > 0
        fail_msg: >
          La variable 'team_name' doit être fournie, par exemple :
          ansible-playbook grafana-automation/playbooks/add_grafana_user_to_team.yml
          --extra-vars "team_name=company1"

    - name: Validate Grafana credentials
      ansible.builtin.assert:
        that:
          - grafana_username is defined
          - grafana_password is defined
          - grafana_username | length > 0
          - grafana_password | length > 0
          - grafana_api_token is defined
          - grafana_api_token | length > 0
        fail_msg: >
          GRAFANA_USERNAME, GRAFANA_PASSWORD et GRAFANA_API_TOKEN doivent être définis
          dans l'environnement (.env) et correspondre à un compte / token Admin.

    - name: Check Grafana health
      ansible.builtin.uri:
        url: "{{ grafana_url }}/api/health"
        method: GET
        headers: "{{ grafana_auth_headers }}"
        status_code: 200
        validate_certs: false
      register: grafana_health
      failed_when: grafana_health.status != 200

    # ------------------------------------------------------------------
    # Récupérer la team existante
    # ------------------------------------------------------------------

    - name: Search existing team by name
      ansible.builtin.uri:
        url: "{{ grafana_url }}/api/teams/search?name={{ team_name }}"
        method: GET
        headers: "{{ grafana_auth_headers }}"
        status_code: 200
        validate_certs: false
      register: team_search

    - name: Fail if team not found
      ansible.builtin.fail:
        msg: >
          La team Grafana '{{ team_name }}' est introuvable via /api/teams/search.
          Vérifie le nom dans Grafana.
      when: (team_search.json.teams | default([]) | length) == 0

    - name: Set grafana_team_id fact
      ansible.builtin.set_fact:
        grafana_team_id: "{{ (team_search.json.teams | first).id }}"

    - name: Debug team id
      ansible.builtin.debug:
        msg:
          - "Team trouvée pour team_name='{{ team_name }}'"
          - "team_id={{ grafana_team_id }}"

    # ------------------------------------------------------------------
    # Créer / assurer l'existence de l'utilisateur via API REST
    # ------------------------------------------------------------------

    - name: Lookup user by login
      ansible.builtin.uri:
        url: "{{ grafana_url }}/api/users/lookup?loginOrEmail={{ user_login }}"
        method: GET
        url_username: "{{ grafana_username }}"
        url_password: "{{ grafana_password }}"
        force_basic_auth: true
        status_code: [200, 404]
        validate_certs: false
      register: user_by_login

    - name: Lookup user by email (si login introuvable)
      ansible.builtin.uri:
        url: "{{ grafana_url }}/api/users/lookup?loginOrEmail={{ user_email }}"
        method: GET
        url_username: "{{ grafana_username }}"
        url_password: "{{ grafana_password }}"
        force_basic_auth: true
        status_code: [200, 404]
        validate_certs: false
      register: user_by_email
      when: user_by_login.status == 404

    - name: Create Grafana user (si ni login ni email n'existent)
      ansible.builtin.uri:
        url: "{{ grafana_url }}/api/admin/users"
        method: POST
        url_username: "{{ grafana_username }}"
        url_password: "{{ grafana_password }}"
        force_basic_auth: true
        body_format: json
        body:
          name: "{{ team_name }} User"
          login: "{{ user_login }}"
          email: "{{ user_email }}"
          password: "{{ user_password }}"
          OrgId: 1
        status_code: 200
        validate_certs: false
      when: user_by_login.status == 404 and user_by_email.status == 404
      register: user_created

    - name: Lookup newly created user by login
      ansible.builtin.uri:
        url: "{{ grafana_url }}/api/users/lookup?loginOrEmail={{ user_login }}"
        method: GET
        url_username: "{{ grafana_username }}"
        url_password: "{{ grafana_password }}"
        force_basic_auth: true
        status_code: 200
        validate_certs: false
      register: user_after_create
      when: user_by_login.status == 404 and user_by_email.status == 404

    - name: Set grafana_user_id (trouvé par login)
      ansible.builtin.set_fact:
        grafana_user_id: "{{ user_by_login.json.id }}"
      when: user_by_login.status == 200

    - name: Set grafana_user_id (trouvé par email)
      ansible.builtin.set_fact:
        grafana_user_id: "{{ user_by_email.json.id }}"
      when: user_by_login.status == 404 and user_by_email.status == 200

    - name: Set grafana_user_id (utilisateur créé)
      ansible.builtin.set_fact:
        grafana_user_id: "{{ user_after_create.json.id }}"
      when: user_by_login.status == 404 and (user_by_email.status | default(404)) == 404

    # ------------------------------------------------------------------
    # Ajouter l'utilisateur à la team
    # ------------------------------------------------------------------

    - name: Check if user is already member of team
      ansible.builtin.uri:
        url: "{{ grafana_url }}/api/teams/{{ grafana_team_id }}/members"
        method: GET
        headers: "{{ grafana_auth_headers }}"
        status_code: 200
        validate_certs: false
      register: team_members

    - name: Add user to team (if not already member)
      ansible.builtin.uri:
        url: "{{ grafana_url }}/api/teams/{{ grafana_team_id }}/members"
        method: POST
        headers:
          Authorization: "Bearer {{ grafana_api_token }}"
          Content-Type: "application/json"
        body_format: json
        body:
          userId: "{{ grafana_user_id | int }}"
        status_code: 200
        validate_certs: false
      when: >
        (team_members.json | selectattr('userId', 'equalto', grafana_user_id | int) | list | length) == 0

    - name: Display created/updated user info
      ansible.builtin.debug:
        msg:
          - "============================================"
          - "User ajouté à une team Grafana existante"
          - "============================================"
          - "Team: {{ team_name }} (id={{ grafana_team_id }})"
          - "User login: {{ user_login }}"
          - "User email: {{ user_email }}"

    # ------------------------------------------------------------------
    # Dashboard via template Jinja
    # ------------------------------------------------------------------

    - name: Ensure dashboard template exists
      ansible.builtin.stat:
        path: "{{ dashboard_template }}"
      register: dashboard_template_stat

    - name: Fail if dashboard template is missing
      ansible.builtin.fail:
        msg: >
          Le template de dashboard est introuvable :
          {{ dashboard_template }}
          Assure-toi que le fichier 'grafana-automation/templates/dashboard.json.j2'
          est bien présent sur le serveur.
      when: not dashboard_template_stat.stat.exists

    # ------------------------------------------------------------------
    # Datasource InfluxDB dédiée à cet utilisateur (clientId = user_login)
    # ------------------------------------------------------------------

    - name: Ensure manage_influx_tokens.py is present
      ansible.builtin.stat:
        path: "/srv/powerview/manage_influx_tokens.py"
      register: manage_tokens_script

    - name: Fail if manage_influx_tokens.py is missing
      ansible.builtin.fail:
        msg: "Le script /srv/powerview/manage_influx_tokens.py est introuvable."
      when: not manage_tokens_script.stat.exists

    - name: Create or get dedicated InfluxDB token for bucket
      ansible.builtin.command: >
        python3 /srv/powerview/manage_influx_tokens.py
        --bucket {{ company_name }}
      register: bucket_token_cmd
      changed_when: false

    - name: Set fact for bucket token
      ansible.builtin.set_fact:
        influxdb_bucket_token: "{{ bucket_token_cmd.stdout | trim }}"

    - name: Check if user datasource already exists
      ansible.builtin.uri:
        url: "{{ grafana_url }}/api/datasources/name/influxdb_{{ company_name }}_{{ user_login }}"
        method: GET
        headers: "{{ grafana_auth_headers }}"
        status_code: [200, 404]
        validate_certs: false
      register: existing_user_ds

    - name: Create user InfluxDB datasource
      community.grafana.grafana_datasource:
        url: "{{ grafana_url }}"
        url_username: "{{ grafana_username }}"
        url_password: "{{ grafana_password }}"
        name: "influxdb_{{ company_name }}_{{ user_login }}"
        ds_type: influxdb
        ds_url: "{{ influxdb_url | default('http://influxdb:8086') }}"
        access: proxy
        is_default: false
        additional_json_data:
          version: "Flux"
          organization: "{{ influxdb_org }}"
          defaultBucket: "{{ company_name }}"
          tlsSkipVerify: true
          httpMode: "POST"
          httpHeaderName1: "Authorization"
          readOnly: true
          channelsList: []
          triphasicList: []
          virtualSeries: []
          seriesConfigApiUrl: "/api/datasources/proxy/25"
          clientId: "{{ user_login }}"
        additional_secure_json_data:
          httpHeaderValue1: "Token {{ influxdb_bucket_token }}"
          token: "{{ influxdb_bucket_token }}"
        state: present
        validate_certs: false
      register: created_user_ds
      when: existing_user_ds.status == 404

    - name: Get user datasource by name
      ansible.builtin.uri:
        url: "{{ grafana_url }}/api/datasources/name/influxdb_{{ company_name }}_{{ user_login }}"
        method: GET
        headers: "{{ grafana_auth_headers }}"
        status_code: 200
        validate_certs: false
      register: ds_get

    - name: Patch user datasource to use custom plugin type
      ansible.builtin.uri:
        url: "{{ grafana_url }}/api/datasources/{{ ds_get.json.id }}"
        method: PUT
        headers:
          Authorization: "Bearer {{ grafana_api_token }}"
          Content-Type: "application/json"
        body_format: json
        body: >-
          {{
            ds_get.json
            | combine(
                {
                  'type': 'influxdb-adecwatts-datasource',
                  'jsonData': (
                    (ds_get.json.jsonData | default({}))
                    | combine(
                        {
                          'httpHeaderName1': 'Authorization',
                          'version': 'Flux',
                          'organization': influxdb_org,
                          'defaultBucket': company_name,
                          'tlsSkipVerify': true,
                          'httpMode': 'POST',
                          'readOnly': true,
                          'channelsList': [],
                          'triphasicList': [],
                          'virtualSeries': [],
                          'seriesConfigApiUrl': '/api/datasources/proxy/25',
                          'clientId': user_login
                        },
                        recursive=True
                      )
                  ),
                  'secureJsonData': (
                    (ds_get.json.secureJsonData | default({}))
                    | combine(
                        {
                          'httpHeaderValue1': 'Token ' ~ influxdb_bucket_token,
                          'token': influxdb_bucket_token
                        },
                        recursive=True
                      )
                  )
                },
                recursive=True
              )
          }}
        status_code: 200
        validate_certs: false

    - name: Set datasource facts for dashboard template
      ansible.builtin.set_fact:
        datasource_uid: "{{ ds_get.json.uid }}"
        datasource_id: "{{ ds_get.json.id }}"
        datasource_client_id: "{{ user_login }}"

    - name: Render company dashboard JSON from template
      ansible.builtin.template:
        src: "{{ dashboard_template }}"
        dest: "{{ campaign_dashboard_json }}"
        mode: "0644"
      when: dashboard_template_stat.stat.exists

    - name: Import company dashboard (idempotent via UID fixe)
      community.grafana.grafana_dashboard:
        url: "{{ grafana_url }}"
        url_username: "{{ grafana_username }}"
        url_password: "{{ grafana_password }}"
        state: present
        path: "{{ campaign_dashboard_json }}"
        folder: "{{ company_name }}"
        uid: "{{ campaign_dashboard_uid }}"
        overwrite: true
        validate_certs: false
      register: imported_dashboard

    # ------------------------------------------------------------------
    # Permissions : team=Viewer, cet utilisateur=Editor sur son dashboard
    # ------------------------------------------------------------------

    - name: Set dashboard permissions (team=Viewer, owner=Editor)
      ansible.builtin.uri:
        url: "{{ grafana_url }}/api/dashboards/uid/{{ campaign_dashboard_uid }}/permissions"
        method: POST
        headers: "{{ grafana_auth_headers }}"
        body_format: json
        body:
          items:
            - teamId: "{{ grafana_team_id }}"
              permission: 1
            - userId: "{{ grafana_user_id | int }}"
              permission: 2
        status_code: 200
        validate_certs: false

    - name: Clean up temporary dashboard file
      ansible.builtin.file:
        path: "{{ campaign_dashboard_json }}"
        state: absent

    - name: Display created/updated user info
      ansible.builtin.debug:
        msg:
          - "============================================"
          - "User ajouté à une team Grafana existante"
          - "============================================"
          - "Team: {{ team_name }} (id={{ grafana_team_id }})"
          - "User login: {{ user_login }}"
          - "User email: {{ user_email }}"
          - "Datasource: influxdb_{{ company_name }}_{{ user_login }} (clientId={{ user_login }})"
          - "Dashboard UID: {{ campaign_dashboard_uid }} (Editor pour {{ user_login }}, Viewer pour la team)"
